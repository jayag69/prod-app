apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prod-app
  template:
    metadata:
      labels:
        app: prod-app
    spec:
      containers:
      - name: prod-app
        image: johnacr369.azurecr.io/prod-app:v1
        ports:
        - containerPort: 3000
